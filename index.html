        "Прекрати искать и увидишь, что Ты — то, что ищет.",
        "Тишина — это не отсутствие звука. Это присутствие Тебя без мыслей.",
        "Нет пути к Себе. Есть только осознание, что Ты никогда не уходил.",
        "Ты — экран, на котором разворачивается кино жизни. Экран всегда чист.",
        "Все, что появляется и исчезает — не Ты. Свидетель остается всегда.",
        "Ничего не удерживай. Ничего не отталкивай. Просто будь.",
        "Твоя истинная природа — безграничное блаженство, скрытое шумом ума.",
        "Ты не в мире. Мир в Тебе.",
        "Единственная реальность — это Я ЕСТЬ здесь и сейчас.",
        "Когда искатель исчезает, остаётся только Истина.",
        "Ум создаёт разделение. Сердце знает единство.",
        "Ты — пространство, в котором происходит всё. Пространство не затронуто.",
        "Отпусти того, кем ты себя считаешь. Останется то, чем Ты являешься.",
        "Нет ничего, что нужно достичь. Есть только иллюзия, которую нужно отпустить.",
        "Наблюдай мысли, не следуя за ними. Ты — небо, они — облака.",
        "Страдание заканчивается там, где заканчивается «я».",
        "Тот, кто ищет просветления, и есть единственное препятствие к нему.",
        "В глубокой тишине ум растворяется, и остаётся только Бытие.",
        "Реальность не нуждается в доказательствах. Она просто есть.",
        "Между двумя мыслями — бесконечность. Это и есть Ты.",
        "Всё, что ты ищешь, уже здесь. Просто перестань убегать.",
        "Присутствие — это не практика. Это твоя природа.",
        "Каждый вдох — напоминание: Ты жив. Ты есть. Этого достаточно.",
        "Не спрашивай «кто я?» умом. Почувствуй ответ тишиной.",
        "Волна не перестаёт быть океан, даже когда забывает об этом.",
        "Свобода — не в выборе. Свобода — в осознании того, кто выбирает.",
        "Любовь — это не чувство. Это отсутствие границ между тобой и миром.",
        "Когда ты по-настоящему тих, вселенная начинает говорить.",
        "То, что ты есть, невозможно потерять. То, чем ты не являешься, невозможно удержать."
    ];

    var audio = null;
    function initAudio() { if (!audio) audio = new (window.AudioContext || window.webkitAudioContext)(); if (audio.state === 'suspended') audio.resume(); }

    var wakeLock = null;
    function requestWakeLock() { if ('wakeLock' in navigator) { navigator.wakeLock.request('screen').then(function(wl) { wakeLock = wl; }).catch(function(){}); } }
    function releaseWakeLock() { if (wakeLock) { wakeLock.release().catch(function(){}); wakeLock = null; } }

    function resetZoom() {
        document.activeElement.blur();
        var vp = document.querySelector('meta[name="viewport"]');
        vp.setAttribute('content', 'width=device-width, initial-scale=0.9999, maximum-scale=0.9999, user-scalable=no, viewport-fit=cover');
        requestAnimationFrame(function() { vp.setAttribute('content', 'width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover'); });
        window.scrollTo(0, 0);
    }

    var allInputs = document.querySelectorAll('.interval-input');
    for (var ii = 0; ii < allInputs.length; ii++) { allInputs[ii].addEventListener('blur', function() { setTimeout(resetZoom, 50); }); }

    var echoParticles = [], isEchoHolding = false, echoGain = null, echoDroneOscs = [], revealTimer = null, touchX = 0, touchY = 0;
    function openEcho() { trackEvent('echo_open'); initAudio(); els.echo.classList.add('active'); var idx = Math.floor(Math.random() * advaitaQuotes.length); els.echoText.textContent = advaitaQuotes[idx]; els.echoText.classList.remove('reveal'); els.echoHint.style.opacity = "0.5"; initEchoCanvas(); }
    function closeEcho(e) { if(e) { e.preventDefault(); e.stopPropagation(); } els.echo.classList.remove('active'); stopEchoReveal(); }
    function initEchoCanvas() {
        var c = els.echoCanvas; var ctxE = c.getContext('2d'); c.width = window.innerWidth; c.height = window.innerHeight;
        echoParticles = []; for(var i=0; i<200; i++) { echoParticles.push({ x: Math.random()*c.width, y: Math.random()*c.height, s: Math.random()*2+0.5, vx: (Math.random()-0.5)*0.5, vy: (Math.random()-0.5)*0.5, a: Math.random()*0.4+0.1 }); }
        function drawE() { if(!els.echo.classList.contains('active')) return; ctxE.clearRect(0,0,c.width,c.height); var color = cachedGold; for(var j=0; j<echoParticles.length; j++) { var p = echoParticles[j]; if(isEchoHolding) { var dx = touchX-p.x, dy = touchY-p.y; var dist = Math.sqrt(dx*dx+dy*dy); if(dist>5){ p.vx += (dx/dist)*0.6; p.vy += (dy/dist)*0.6; } p.vx *= 0.94; p.vy *= 0.94; } else { p.vx += (Math.random()-0.5)*0.05; p.vy += (Math.random()-0.5)*0.05; p.vx *= 0.98; p.vy *= 0.98; } p.x += p.vx; p.y += p.vy; if(p.x<0||p.x>c.width) p.vx *= -1; if(p.y<0||p.y>c.height) p.vy *= -1; ctxE.globalAlpha = isEchoHolding ? 0.8 : p.a; ctxE.fillStyle = color; ctxE.beginPath(); ctxE.arc(p.x,p.y,p.s,0,TWO_PI); ctxE.fill(); } requestAnimationFrame(drawE); }
        drawE();
    }
    function startEchoReveal(e) { if(e.target.closest('#echoClose')) return; e.preventDefault(); isEchoHolding = true; touchX = e.clientX || (e.touches && e.touches[0].clientX); touchY = e.clientY || (e.touches && e.touches[0].clientY); clearTimeout(revealTimer); revealTimer = setTimeout(function() { if(isEchoHolding) { els.echoText.classList.add('reveal'); els.echoHint.style.opacity = "0"; } }, 3000 + Math.random() * 4000); startEchoSound(); }
    function stopEchoReveal() { isEchoHolding = false; clearTimeout(revealTimer); els.echoText.classList.remove('reveal'); els.echoHint.style.opacity = "0.5"; stopEchoSound(); }
    function startEchoSound() { var now = audio.currentTime; if (echoDroneOscs.length === 0) { echoGain = audio.createGain(); echoGain.gain.setValueAtTime(0, now); echoGain.connect(audio.destination); var tones = [{f:73.42,v:0.1,t:'sine'},{f:73.7,v:0.06,t:'sine'},{f:146.83,v:0.04,t:'sine'},{f:220,v:0.02,t:'sine'},{f:110,v:0.03,t:'triangle'}]; for (var i=0; i<tones.length; i++) { var t = tones[i]; var osc = audio.createOscillator(); var g = audio.createGain(); osc.type = t.t; osc.frequency.setValueAtTime(t.f, now); g.gain.value = t.v; var lfo = audio.createOscillator(); var lfoG = audio.createGain(); lfo.frequency.value = 0.15 + Math.random()*0.3; lfoG.gain.value = 0.4; lfo.connect(lfoG); lfoG.connect(osc.frequency); lfo.start(now); osc.connect(g); g.connect(echoGain); osc.start(now); echoDroneOscs.push({ osc:osc, lfo:lfo, g:g }); } } echoGain.gain.cancelScheduledValues(now); echoGain.gain.linearRampToValueAtTime(1, now + 2); }
    function stopEchoSound() { if (echoGain) { var now = audio.currentTime; echoGain.gain.cancelScheduledValues(now); echoGain.gain.linearRampToValueAtTime(0, now + 1.5); setTimeout(function() { if (!isEchoHolding && echoDroneOscs.length > 0) { for(var i=0;i<echoDroneOscs.length;i++){ try{echoDroneOscs[i].osc.stop();echoDroneOscs[i].lfo.stop();}catch(e){} } echoDroneOscs = []; } }, 1600); } }

    var reverbNode = null;
    function ensureReverb() { if (reverbNode) return; var len = audio.sampleRate * 2.5; var buf = audio.createBuffer(2, len, audio.sampleRate); for (var ch = 0; ch < 2; ch++) { var data = buf.getChannelData(ch); for (var i = 0; i < len; i++) data[i] = (Math.random()*2-1) * Math.pow(1-i/len, 2.2); } reverbNode = audio.createConvolver(); reverbNode.buffer = buf; reverbNode.connect(audio.destination); }
    function playStrikeNoise(dest, volume, duration) { var now = audio.currentTime; var bufLen = Math.floor(audio.sampleRate * duration); if (bufLen < 1) return; var buf = audio.createBuffer(1, bufLen, audio.sampleRate); var data = buf.getChannelData(0); for (var i = 0; i < bufLen; i++) data[i] = (Math.random()*2-1) * Math.exp(-i/(audio.sampleRate*0.008)); var noise = audio.createBufferSource(); noise.buffer = buf; var bp = audio.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = 2500; bp.Q.value = 0.8; var g = audio.createGain(); g.gain.setValueAtTime(volume, now); g.gain.exponentialRampToValueAtTime(0.0001, now + duration); noise.connect(bp); bp.connect(g); g.connect(dest); noise.start(now); noise.stop(now + duration); }
    function playBowl(baseFreq, decayExtra, dryVal, wetVal, strikeVol, volumeMult) { var vol = volumeMult || 1; var now = audio.currentTime; ensureReverb(); var dry = audio.createGain(); var wet = audio.createGain(); dry.gain.value = dryVal; wet.gain.value = wetVal; dry.connect(audio.destination); wet.connect(reverbNode); var harmonics = [[1,0.12,5,0],[1.003,0.1,4.8,0],[2.71,0.06,3.5,0.5],[2.72,0.04,3.3,0],[4.16,0.03,2.5,0.8],[5.43,0.015,2,1],[6.8,0.008,1.5,1.2]]; for (var i = 0; i < harmonics.length; i++) { var h = harmonics[i]; var decay = h[2] + decayExtra; var hVol = h[1] * vol; var osc = audio.createOscillator(); var g = audio.createGain(); osc.type = 'sine'; osc.frequency.setValueAtTime(baseFreq * h[0] + h[3], now); g.gain.setValueAtTime(0, now); g.gain.linearRampToValueAtTime(hVol, now + 0.015); g.gain.exponentialRampToValueAtTime(hVol * 0.4, now + decay * 0.3); g.gain.exponentialRampToValueAtTime(0.0001, now + decay); var lfo = audio.createOscillator(); var lfoG = audio.createGain(); lfo.frequency.value = 3 + Math.random() * 2; lfoG.gain.value = h[0] > 3 ? 1.5 : 0.5; lfo.connect(lfoG); lfoG.connect(osc.frequency); lfo.start(now); osc.connect(g); g.connect(dry); g.connect(wet); osc.start(now); osc.stop(now + decay + 0.5); lfo.stop(now + decay + 0.5); } playStrikeNoise(dry, strikeVol, 0.06); }
    function playSingingBowl(stage) { if (stage === 3) return; var bases = [349.23, 440, 293.66, 0, 523.25]; var baseFreq = bases[stage] || 440; var strikeVol = (stage === 1) ? 0.02 : 0.04; playBowl(baseFreq, 0, 0.7, 0.3, strikeVol); if (stage === 4) setTimeout(function(){ playSingingBowl(2); }, 300); }
    function playMegaGong() { playBowl(196.00, 2, 0.55, 0.45, 0.04, 1.2); }

    var BREATH_MIN = 1.0, BREATH_MAX = 1.12;
    function updateBreathAnimation(progress) { var scale; if (state.idx === 0) scale = BREATH_MIN + (BREATH_MAX-BREATH_MIN)*progress; else if (state.idx === 1) scale = BREATH_MAX + Math.sin(progress*TWO_PI*2)*0.008; else if (state.idx === 2) scale = BREATH_MAX - (BREATH_MAX-BREATH_MIN)*progress; else scale = BREATH_MIN; els.triangleSvg.style.transform = 'scale('+scale+')'; }

    for(var ei=0; ei<els.edges.length; ei++) { els.edges[ei].style.strokeDasharray = edgeLengths[ei]; els.edges[ei].style.strokeDashoffset = edgeLengths[ei]; }

    try {
        state.totalSec = parseInt(localStorage.getItem('mb_total')) || 0;
        var saved = JSON.parse(localStorage.getItem('mb_ints')); if (saved) { for(var si=0;si<3;si++) state.ints[si] = parseFloat(saved[si]) || state.ints[si]; }
        state.reps = parseInt(localStorage.getItem('mb_repeats')) || 10;
        state.night = localStorage.getItem('mb_night') === 'true';
        for(var ini=0;ini<els.inputs.length;ini++) els.inputs[ini].value = state.ints[ini];
        els.repeats.value = state.reps; if (state.night) applyTheme();
    } catch(e){}

    updateCachedGold();

    function handleStart(e) {
        if(e) { e.preventDefault(); e.stopPropagation(); }
        trackEvent('practice_start'); initAudio(); resetZoom();
        if(!state.running){
            state.ints = [];
            for(var i=0;i<els.inputs.length;i++) {
                var val = parseFloat(els.inputs[i].value)||1; state.ints.push(val);
                if(i===0 && val > appStats.maxVdoh) { appStats.maxVdoh = val; localStorage.setItem('mb_max_vdoh', val); }
                if(i===1 && val > appStats.maxHold) { appStats.maxHold = val; localStorage.setItem('mb_max_hold', val); }
                if(i===2 && val > appStats.maxOut) { appStats.maxOut = val; localStorage.setItem('mb_max_out', val); }
            }
            state.reps = parseInt(els.repeats.value) || 1; localStorage.setItem('mb_ints', JSON.stringify(state.ints)); localStorage.setItem('mb_repeats', state.reps);
            state.running = true; state.paused = false; state.curRep = 1; document.body.classList.add('running'); els.startBtn.textContent = 'ПАУЗА'; requestWakeLock(); renderDots(); runIdx(0);
        } else if(!state.paused){ state.paused = true; els.startBtn.textContent = 'ПРОДОЛЖИТЬ'; releaseWakeLock(); } 
        else { state.paused = false; els.startBtn.textContent = 'ПАУЗА'; requestWakeLock(); state.lastTick = performance.now(); requestAnimationFrame(engine); }
    }

    function handleReset(e) { if(e) { e.preventDefault(); e.stopPropagation(); } state.running = false; state.paused = false; document.body.classList.remove('running'); els.startBtn.textContent = 'СТАРТ'; els.display.textContent = '0'; els.statusText.textContent = 'ГОТОВ'; for(var i=0;i<els.edges.length;i++) { els.edges[i].style.opacity = 0; els.edges[i].style.strokeDashoffset = edgeLengths[i]; } els.triangleSvg.style.transform = 'scale(1.05)'; releaseWakeLock(); renderDots(); }

    function handleTheme(e) { if(e) { e.preventDefault(); e.stopPropagation(); } state.night = !state.night; applyTheme(); localStorage.setItem('mb_night', state.night); }
    function applyTheme() { document.body.classList.toggle('night-theme', state.night); document.getElementById('sunIcon').style.display = state.night ? 'none' : 'block'; document.getElementById('moonIcon').style.display = state.night ? 'block' : 'none'; var meta = document.querySelector('meta[name="theme-color"]'); if (meta) meta.setAttribute('content', state.night ? '#000000' : '#f4f1ea'); updateCachedGold(); }

    function runIdx(idx) {
        if(idx >= 4) {
            appStats.totalVdoh++; localStorage.setItem('mb_total_vdoh', appStats.totalVdoh);
            if (state.curRep > appStats.maxCycles) { appStats.maxCycles = state.curRep; localStorage.setItem('mb_max_cycles', appStats.maxCycles); }
            renderStatText();
            if(state.curRep < state.reps) { state.curRep++; renderDots(); playSingingBowl(4); runIdx(0); } else { done(); }
            return;
        }
        state.idx = idx; state.dur = (idx===3 ? 0.2 : state.ints[idx]) * 1000; state.timeLeft = state.dur;
        var labels = ["Вдох","Задержка","Выдох","Пауза"]; els.statusText.textContent = labels[idx];
        if(idx<3) playSingingBowl(idx); state.lastTick = performance.now(); requestAnimationFrame(engine);
    }

    function engine(now) {
        if(!state.running||state.paused) return;
        var delta = now - state.lastTick; state.lastTick = now;
        state.timeLeft -= delta;
        if (state.idx === 1) { 
            var oldHold = Math.floor(appStats.totalHold); appStats.totalHold += delta / 1000; 
            if (Math.floor(appStats.totalHold) !== oldHold) { localStorage.setItem('mb_total_hold', appStats.totalHold); if (statModes[currentStatIdx].id === 'hold') renderStatText(); }
        }
        var sec = Math.ceil(state.timeLeft/1000);
        if(sec>=0 && els.display.textContent != sec) { els.display.classList.add('tick'); setTimeout(function(){ els.display.textContent = sec; els.display.classList.remove('tick'); }, 150); }
        updateEdges((state.timeLeft/state.dur)*100); updateBreathAnimation(1 - (state.timeLeft/state.dur));
        if(state.timeLeft<=0) runIdx(state.idx+1); else requestAnimationFrame(engine);
    }

    function updateEdges(pct) { var p = 1-(pct/100); if(state.idx===0) { els.edges[0].style.opacity=1; els.edges[0].style.strokeDashoffset=edgeLengths[0]-(p*edgeLengths[0]); els.edges[1].style.opacity=0; els.edges[2].style.opacity=0; } else if(state.idx===1) { els.edges[0].style.opacity=1; els.edges[0].style.strokeDashoffset=0; els.edges[1].style.opacity=1; els.edges[1].style.strokeDashoffset=edgeLengths[1]-(p*edgeLengths[1]); els.edges[2].style.opacity=0; } else if(state.idx===2) { els.edges[0].style.opacity=1; els.edges[0].style.strokeDashoffset=0; els.edges[1].style.opacity=1; els.edges[1].style.strokeDashoffset=0; els.edges[2].style.opacity=1; els.edges[2].style.strokeDashoffset=edgeLengths[2]-(p*edgeLengths[2]); } }
    function done() { trackEvent('practice_finish'); playMegaGong(); handleReset(); }
    function renderDots() { els.cycleDots.innerHTML = ''; els.cycleDots.className = 'cycle-progress'; if(state.reps>20) els.cycleDots.classList.add('ultra-compact'); else if(state.reps>12) els.cycleDots.classList.add('compact'); for(var i=1;i<=state.reps;i++) { var d = document.createElement('div'); d.className = 'cycle-dot' + (i<=state.curRep?' active':''); els.cycleDots.appendChild(d); } }
    function updJournal() { localStorage.setItem('mb_total', state.totalSec); if (statModes[currentStatIdx].id === 'time') renderStatText(); }

    var ctx = els.canvas.getContext('2d'); var parts = [];
    function resize() { els.canvas.width = window.innerWidth; els.canvas.height = window.innerHeight; }
    window.onresize = resize; resize();
    function Particle() { this.reset(); }
    Particle.prototype.reset = function() { this.x = Math.random()*els.canvas.width; this.y = Math.random()*els.canvas.height; this.s = Math.random()*2+0.5; this.vX = (Math.random()-0.5)*0.2; this.vY = (Math.random()-0.5)*0.2; this.a = 0; this.f = Math.random()*0.01+0.005; this.m = Math.random()*0.4+0.1; this.growing = true; };
    Particle.prototype.update = function() { this.x += this.vX; this.y += this.vY; if(this.growing){ this.a += this.f; if(this.a>=this.m) this.growing=false; } else { this.a -= this.f; if(this.a<=0) this.reset(); } };
    Particle.prototype.draw = function() { ctx.fillStyle = cachedGold; ctx.globalAlpha = this.a; ctx.beginPath(); ctx.arc(this.x,this.y,this.s,0,TWO_PI); ctx.fill(); };
    for(var pi=0; pi<35; pi++) parts.push(new Particle());
    function anim() { ctx.clearRect(0,0,els.canvas.width,els.canvas.height); for(var i=0;i<parts.length;i++){ parts[i].update(); parts[i].draw(); } requestAnimationFrame(anim); }
    anim();

    setInterval(function() { if(state.running&&!state.paused&&state.idx!==3) { state.totalSec++; updJournal(); } }, 1000);
    renderStatText(); renderDots();

    var lastSeenW = localStorage.getItem('mb_v19_welcome');
    if (!lastSeenW || (Date.now() - parseInt(lastSeenW) > 86400000)) { setTimeout(function() { els.welcome.classList.add('show'); setTimeout(function(){ els.welcome.classList.remove('show'); }, 4000); }, 1000); localStorage.setItem('mb_v19_welcome', Date.now().toString()); }
    if ('serviceWorker' in navigator) { navigator.serviceWorker.register('./sw.js').catch(function(){}); }
</script>
